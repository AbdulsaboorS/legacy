# codemagic.yaml — Legacy iOS Build Pipeline
#
# Human setup required before this pipeline can run:
#
# 1. App Store Connect API key:
#    Codemagic Team > Integrations > App Store Connect
#    Upload: issuer ID, key ID, and .p8 private key file
#    Name the integration "codemagic" (must match `app_store_connect: codemagic` below)
#
# 2. iOS code signing assets:
#    Codemagic Team > Code signing > iOS certificates
#    Upload: distribution certificate (.p12 + password)
#    Upload: App Store provisioning profile (.mobileprovision)
#
# 3. Environment variable:
#    Codemagic Team > Environment variables
#    Set APP_STORE_APPLE_ID to the numeric App Store Connect app ID
#    (found in App Store Connect > My Apps > App Information > Apple ID)
#
# 4. iOS project must exist:
#    Run `npx cap add ios` locally and commit the ios/ directory before triggering a build.
#    The ios/App/App.xcworkspace path referenced below is generated by that command.

workflows:
  ios-workflow:
    name: Legacy iOS
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.joinlegacy
      vars:
        APP_STORE_APPLE_ID: $APP_STORE_APPLE_ID  # Set in Codemagic Team > Environment Variables
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: v20.14.0
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false  # Switch to true when ready for full App Store release
